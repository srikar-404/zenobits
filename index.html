<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="theme-meta" content="#0a0a0a">
<title>LifeOS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#111;--card:#1a1a1a;--surf:#242424;
  --border:rgba(255,255,255,0.08);--text:#f5f5f5;--sub:#888;
  --accent:#5eead4;--nav:64px;
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
  --r:20px;--rs:12px;
  --f1:'DM Sans',sans-serif;--f2:'Syne',sans-serif;--fm:'JetBrains Mono',monospace;
}
:root.light{
  --bg:#f2f2f7;--bg2:#e8e8ed;--card:#ffffff;--surf:#efefef;
  --border:rgba(0,0,0,0.06);--text:#0a0a0a;--sub:#888;
  --accent:#7c3aed;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--f1);background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;transition:background .2s,color .2s}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;overflow:hidden;position:relative}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;display:none;padding-bottom:calc(var(--nav) + var(--safe-b) + 16px);scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}
.screen.active{display:block}
 
/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--nav) + var(--safe-b));padding-bottom:var(--safe-b);background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;z-index:100;transition:background .2s}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--sub);padding:6px 0;transition:color .15s}
.nb svg{width:22px;height:22px;stroke-width:1.7}
.nb span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;font-family:var(--f2)}
.nb.active{color:var(--accent)}
#fab{position:fixed;bottom:calc(var(--nav) + var(--safe-b) + 14px);right:max(16px,calc(50% - 215px + 16px));width:50px;height:50px;border-radius:50%;background:var(--accent);color:#03100e;border:none;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(94,234,212,.3);z-index:50;transition:transform .12s}
:root.light #fab{color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.3)}
#fab:active{transform:scale(.9)}
 
/* HEADER */
.hdr{padding:calc(var(--safe-t) + 44px) 20px 12px;background:var(--bg);position:sticky;top:0;z-index:20;transition:background .2s}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-family:var(--f2);font-size:28px;font-weight:800;letter-spacing:-.5px}
.hdr-acts{display:flex;gap:8px;align-items:center}
.tog{width:40px;height:22px;border-radius:100px;background:var(--surf);border:1px solid var(--border);cursor:pointer;position:relative;transition:all .2s;flex-shrink:0}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--sub);transition:all .2s}
:root.light .tog::after{transform:translateX(18px);background:var(--accent)}
.ib{width:34px;height:34px;border-radius:50%;background:var(--surf);border:1px solid var(--border);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.ib:active{transform:scale(.88)}
 
/* GENERIC */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 18px;border-radius:var(--rs);border:none;cursor:pointer;font-family:var(--f1);font-size:14px;font-weight:700;transition:all .12s}
.bp{background:var(--accent);color:#03100e}.bp:active{opacity:.85;transform:scale(.97)}
:root.light .bp{color:#fff}
.bg{background:var(--surf);color:var(--text);border:1px solid var(--border)}.bg:active{transform:scale(.97)}
input,select,textarea{font-family:var(--f1);background:var(--surf);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;padding:11px 13px;width:100%;outline:none;transition:border-color .15s,background .2s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--sub)}
textarea{resize:none;min-height:80px;line-height:1.5}
select option{background:var(--card)}
.fl{margin-bottom:11px}.fl-lbl{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px;text-transform:uppercase;letter-spacing:.7px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.pb{background:var(--surf);border-radius:100px;overflow:hidden}
.pbf{height:100%;border-radius:100px;transition:width .4s ease}
 
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:14px 20px calc(20px + var(--safe-b));width:100%;max-width:430px;max-height:92dvh;overflow-y:auto;scrollbar-width:none;animation:sUp .26s cubic-bezier(.34,1.15,.64,1);transition:background .2s}
.modal::-webkit-scrollbar{display:none}
@keyframes sUp{from{transform:translateY(100%);opacity:.4}to{transform:translateY(0);opacity:1}}
.m-handle{width:36px;height:4px;background:var(--surf);border-radius:2px;margin:0 auto 18px}
.m-title{font-family:var(--f2);font-size:20px;font-weight:800;margin-bottom:16px}
.sw-row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .12s}
.sw.sel{border-color:var(--text);transform:scale(1.2)}
#toast{position:fixed;bottom:calc(var(--nav) + var(--safe-b) + 16px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);padding:8px 20px;border-radius:100px;font-size:13px;font-weight:700;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spin{width:20px;height:20px;border:2px solid var(--surf);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite;margin:14px auto}
@keyframes rot{to{transform:rotate(360deg)}}
.empty-s{text-align:center;padding:50px 20px;color:var(--sub)}
.empty-s .ei{font-size:40px;margin-bottom:10px}
.empty-s p{font-size:13px;line-height:1.6}
 
/* ══════════════ HABITS SCREEN ══════════════ */
.h-tabs{display:flex;gap:4px;margin:12px 20px 0;background:var(--surf);border-radius:14px;padding:4px}
.h-tab{flex:1;padding:8px 0;border:none;border-radius:10px;background:none;color:var(--sub);font-family:var(--f1);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.h-tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.2)}
 
.h-status{padding:10px 20px 14px;display:flex;flex-direction:column;gap:6px}
.h-progress-bar{height:4px;background:var(--surf);border-radius:100px;overflow:hidden}
.h-progress-fill{height:100%;border-radius:100px;background:var(--accent);transition:width .4s ease}
.h-done-count{font-size:13px;color:#e55;font-weight:600}
.h-done-count.all{color:var(--accent)}
 
/* SWIPE CARDS */
.h-cards{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.h-card-wrap{position:relative;border-radius:var(--r);overflow:hidden;height:72px;flex-shrink:0}
.h-card-bg{
  position:absolute;inset:0;border-radius:var(--r);
  display:flex;align-items:center;
}
.h-card-bg-left{justify-content:flex-start;padding-left:22px;background:rgba(74,222,128,.25)}
.h-card-bg-right{justify-content:flex-end;padding-right:22px;background:rgba(248,113,113,.2)}
.h-card-bg svg{opacity:.9}
.h-card{
  position:absolute;inset:0;border-radius:var(--r);
  display:flex;align-items:center;padding:0 20px;gap:14px;
  cursor:pointer;
  touch-action:pan-y;
  user-select:none;-webkit-user-select:none;
  will-change:transform;
  transition:box-shadow .2s;
}
.h-card.snapping{transition:transform .25s cubic-bezier(.34,1.2,.64,1)}
.h-card-emoji{font-size:22px;flex-shrink:0;line-height:1}
.h-card-name{flex:1;font-size:17px;font-weight:700;color:#fff;line-height:1.2}
.h-card.done .h-card-name{opacity:.6}
.h-card-streak{font-family:var(--fm);font-size:12px;color:rgba(255,255,255,.6);flex-shrink:0}
.h-card-check{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.h-card.done .h-card-check{background:rgba(255,255,255,.9);border-color:transparent}
 
/* WEEKLY / OVERALL VIEW */
.h-weekly-wrap{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.hw-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.hw-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}
.hw-color{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.hw-name{flex:1;font-size:15px;font-weight:700}
.hw-streak{font-family:var(--fm);font-size:12px;color:var(--sub)}
.hw-days{display:flex;gap:0;padding:12px 16px;justify-content:space-between}
.hwd{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.hwd-lbl{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--sub)}
.hwd-lbl.today{color:var(--accent)}
.hwd-dot{
  width:32px;height:32px;border-radius:50%;
  background:var(--surf);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;font-size:13px;
}
.hwd-dot.done{border-color:transparent}
.hwd-dot.today-ring{box-shadow:0 0 0 2px var(--accent)}
.hwd-dot.future{opacity:.3;cursor:default;pointer-events:none}
.hwd-dot:not(.future):active{transform:scale(.85)}
.hw-note{padding:0 16px 12px;font-size:12px;color:var(--sub);border-top:1px solid var(--border);padding-top:10px}
.hw-note-empty{font-style:italic;opacity:.5}
.hw-note-btn{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--sub);font-size:12px;padding:8px 16px;border-top:1px solid var(--border);background:none;width:100%;text-align:left;font-family:var(--f1)}
 
/* OVERALL VIEW */
.ho-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px}
.ho-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.ho-info{flex:1;min-width:0}
.ho-name{font-size:14px;font-weight:700;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ho-pb-wrap{display:flex;align-items:center;gap:8px}
.ho-pb{flex:1;height:5px;border-radius:100px;background:var(--surf);overflow:hidden}
.ho-pbf{height:100%;border-radius:100px;transition:width .4s}
.ho-pct{font-family:var(--fm);font-size:11px;color:var(--sub);min-width:28px;text-align:right}
.ho-streak{font-family:var(--fm);font-size:13px;font-weight:600;color:var(--sub);min-width:34px;text-align:right}
 
/* TODAY SCREEN */
.t-cal{margin:0 16px 11px;background:var(--card);border-radius:var(--r);padding:18px;border:1px solid var(--border)}
.ring-row{display:flex;align-items:center;gap:18px;margin-bottom:14px}
.rw{position:relative;width:96px;height:96px;flex-shrink:0}
.rw svg{transform:rotate(-90deg)}
.ri{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.ri-pct{font-family:var(--fm);font-size:17px;font-weight:600;line-height:1}
.ri-lbl{font-size:9px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.ms-row{display:flex;gap:7px}
.ms{flex:1;background:var(--surf);border-radius:10px;padding:9px 5px;text-align:center}
.ms-v{font-family:var(--fm);font-size:13px;font-weight:600}
.ms-l{font-size:9px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.t-hcard{margin:0 16px 11px;background:var(--card);border-radius:var(--r);padding:16px;border:1px solid var(--border)}
.sec-lbl{font-family:var(--f2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.th{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.th:last-child{border-bottom:none;padding-bottom:0}
.thck{width:30px;height:30px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .15s}
.thck.done{border-color:transparent}
.th-n{flex:1;font-size:14px;font-weight:600;transition:all .15s}
.th-n.done{opacity:.4;text-decoration:line-through}
.wcard{margin:0 16px 11px;background:var(--card);border-radius:var(--r);padding:16px;border:1px solid var(--border)}
.wgg{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 12px}
.wg{width:34px;height:34px;border-radius:8px;background:var(--surf);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .13s}
.wg.on{background:rgba(96,165,250,.15);border-color:#60a5fa}
.wg:active{transform:scale(.86)}
 
/* CALORIES */
.ls-hero{margin:0 16px 11px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:18px 16px 14px}
.ls-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.ls-top h2{font-family:var(--f2);font-size:22px;font-weight:800;line-height:1}
.ls-top .s2{font-size:12px;color:var(--sub);margin-top:3px}
.ls-badge{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--f2);font-size:20px;font-weight:800}
.ls-rings{display:flex;gap:10px;justify-content:space-around;margin-bottom:14px}
.lsr{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1}
.lsr-v{font-family:var(--fm);font-size:13px;font-weight:600}
.lsr-l{font-size:10px;color:var(--sub);font-weight:600}
.ls-bar-top{display:flex;justify-content:space-between;margin-bottom:5px}
.ls-bar-top span{font-size:11px;color:var(--sub)}
.ls-bar-top strong{font-family:var(--fm);font-size:11px}
.meal-sec{margin:0 16px 10px}
.meal-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0}
.meal-hdr.empty{border-radius:var(--r)}
.mhl{display:flex;align-items:center;gap:9px}
.meal-ico{font-size:18px}
.meal-ttl{font-family:var(--f2);font-size:13px;font-weight:700}
.meal-cal-sub{font-family:var(--fm);font-size:11px;color:var(--sub)}
.meal-add{width:26px;height:26px;border-radius:50%;background:var(--surf);border:1px solid var(--border);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .12s}
.meal-add:active{background:var(--accent);color:#03100e}
:root.light .meal-add:active{color:#fff}
.meal-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.fi{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.fi:last-child{border-bottom:none}
.fi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fi-info{flex:1;min-width:0}
.fi-n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-m{font-size:11px;color:var(--sub);margin-top:2px}
.fi-cal{font-family:var(--fm);font-size:13px;font-weight:600;flex-shrink:0}
.fi-del{width:26px;height:26px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);transition:color .12s;flex-shrink:0}
.fi-del:active{color:#f87171}
.sr-item{padding:10px 12px;background:var(--surf);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px;cursor:pointer;transition:all .12s}
.sr-item:active{border-color:var(--accent);transform:scale(.98)}
.sr-n{font-size:13px;font-weight:700}.sr-m{font-size:11px;color:var(--sub);margin-top:2px}
.or-div{text-align:center;font-size:11px;color:var(--sub);margin:8px 0 10px;position:relative}
.or-div::before,.or-div::after{content:'';position:absolute;top:50%;width:36%;height:1px;background:var(--border)}
.or-div::before{left:0}.or-div::after{right:0}
.si-wrap{flex:1;position:relative;display:flex;align-items:center}
.si-wrap svg{position:absolute;left:11px;width:15px;height:15px;stroke:var(--sub);stroke-width:2;pointer-events:none}
.si-wrap input{padding-left:34px;background:var(--card)}
 
/* ANALYTICS */
.st-g{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 16px 10px}
.st-c{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center}
.st-v{font-family:var(--fm);font-size:28px;font-weight:600;color:var(--accent);line-height:1}
.st-l{font-size:10px;color:var(--sub);margin-top:5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.ana-c{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.bchart{display:flex;align-items:flex-end;gap:5px;height:80px;padding-bottom:2px}
.bc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.bc-wr{flex:1;display:flex;align-items:flex-end;width:100%}
.bc-b{width:100%;border-radius:5px 5px 0 0;min-height:3px}
.bc-l{font-size:9px;color:var(--sub);font-weight:700}
.ha-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ha-row:last-child{border-bottom:none;padding-bottom:0}
 
.fm-sec-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--sub);margin:14px 0 7px;padding:0 2px}
.fli{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surf);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:7px;cursor:pointer;transition:all .12s}
.fli:active{border-color:var(--accent);transform:scale(.98)}
.fli-info{flex:1;min-width:0}
.fli-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fli-meta{font-size:11px;color:var(--sub);margin-top:2px}
.fav-btn{background:none;border:none;cursor:pointer;font-size:18px;flex-shrink:0;padding:2px 4px;line-height:1}
.fd-macro-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
</style>
</head>
<body>
<div id="app">
  <div id="s-today" class="screen active"></div>
  <div id="s-habits" class="screen"></div>
  <div id="s-calories" class="screen"></div>
  <div id="s-analytics" class="screen"></div>
  <button id="fab" onclick="openFab()">+</button>
  <nav id="nav">
    <button class="nb active" data-s="today" onclick="nav('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      <span>Today</span>
    </button>
    <button class="nb" data-s="habits" onclick="nav('habits')">

  return s;
}

/* ═══════════════ SWIPE CARDS ═══════════════ */
function attachSwipe(cardEl, hid) {
  let startX=0,startY=0,curX=0,dragging=false,isHoriz=null;
  const THRESHOLD=80;
 
  function onStart(e){
    const pt=e.touches?e.touches[0]:e;
    startX=pt.clientX;startY=pt.clientY;
    curX=0;dragging=true;isHoriz=null;
    cardEl.classList.remove('snapping');
  }
  function onMove(e){
    if(!dragging)return;
    const pt=e.touches?e.touches[0]:e;
    const dx=pt.clientX-startX;
    const dy=pt.clientY-startY;
    if(isHoriz===null){
      if(Math.abs(dx)<6&&Math.abs(dy)<6)return;
      isHoriz=Math.abs(dx)>Math.abs(dy);
    }
    if(!isHoriz)return;
    e.preventDefault();
    curX=dx;
    cardEl.style.transform=`translateX(${curX}px)`;
    cardEl.style.opacity=1-Math.abs(curX)/220;
  }
  function onEnd(){
    if(!dragging||isHoriz===false){dragging=false;return;}
    dragging=false;
    cardEl.classList.add('snapping');
    const done=hLog(today(),hid).done;
    if(curX>THRESHOLD&&!done){
      cardEl.style.transform='translateX(110%)';
      cardEl.style.opacity='0';
      setTimeout(()=>{togH(hid);},200);
    } else if(curX<-THRESHOLD&&done){
      cardEl.style.transform='translateX(-110%)';
      cardEl.style.opacity='0';
      setTimeout(()=>{togH(hid);},200);
    } else {
      cardEl.style.transform='translateX(0)';
      cardEl.style.opacity='1';
    }
    curX=0;
  }
 
  cardEl.addEventListener('touchstart',onStart,{passive:true});
  cardEl.addEventListener('touchmove',onMove,{passive:false});
  cardEl.addEventListener('touchend',onEnd);
  cardEl.addEventListener('mousedown',onStart);
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onEnd);
}

  if(recs.length){
    html+=`<div class="fm-sec-lbl">🕐 Recently tracked</div>`;
    html+=recs.slice(0,12).map(f=>{const k='rc'+(++fcIdx);foodCache[k]=f;return fliItem(f,k,false);}).join('');
  }
  if(!favs.length&&!recs.length){
    html+=`<div style="text-align:center;padding:26px 0;color:var(--sub);font-size:13px">Search for food above<br>or add manually ↓</div>`;
  }

function updateFoodDetail(){
  if(!detailFood)return;
  let cal=detailFood.cal,carb=detailFood.carb,prot=detailFood.prot,fat=detailFood.fat;
  if(detailFood.isManual){
    cal=+document.getElementById('fd-cal').value||0;
    carb=+document.getElementById('fd-carb').value||0;
    prot=+document.getElementById('fd-prot').value||0;
    fat=+document.getElementById('fd-fat').value||0;
    detailFood.cal=cal;detailFood.carb=carb;detailFood.prot=prot;detailFood.fat=fat;
  }
  const qty=Math.max(0.01,+document.getElementById('fd-qty').value||1);
  const ratio=qty/(detailFood.baseQty||1);
  const tCal=Math.round(cal*ratio);
  const tCarb=+(carb*ratio).toFixed(1);
  const tProt=+(prot*ratio).toFixed(1);
  const tFat=+(fat*ratio).toFixed(1);
  document.getElementById('fd-cal-num').textContent=tCal;
  const fC=tCarb*4,fP=tProt*4,fF=tFat*9,tot=fC+fP+fF||1;
  const macros=[
    {l:'Carbs',v:tCarb,pct:Math.round(fC/tot*100),c:'#fbbf24'},
    {l:'Protein',v:tProt,pct:Math.round(fP/tot*100),c:'var(--accent)'},
    {l:'Fat',v:tFat,pct:Math.round(fF/tot*100),c:'#f472b6'},
  ];
  document.getElementById('fd-rings').innerHTML=macros.map(m=>`
    <div class="fd-macro-ring-wrap">
      <div style="position:relative;width:64px;height:64px">
        ${mRing(m.pct,m.c,64,7)}
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
          <span style="font-size:12px;font-weight:700;color:${m.c}">${m.pct}%</span>
        </div>
      </div>
      <div style="font-family:var(--fm);font-size:12px;font-weight:600">${m.v}g</div>
      <div style="font-size:10px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.3px">${m.l}</div>
    </div>`).join('');
  document.getElementById('fd-macrovals').innerHTML=macros.map(m=>`
    <div class="ms" style="flex:1">
      <div class="ms-v" style="color:${m.c}">${m.v}g</div>
      <div class="ms-l">${m.l}</div>
    </div>`).join('');
}
function toggleFav(){
  if(!detailFood)return;
  const entry={name:detailFood.name,cal:detailFood.cal,carb:detailFood.carb,prot:detailFood.prot,fat:detailFood.fat,baseQty:detailFood.baseQty,baseUnit:detailFood.baseUnit,isOffline:detailFood.isOffline};
  if(!S.favorites)S.favorites=[];
  const idx=S.favorites.findIndex(x=>x.name===entry.name);
  if(idx>=0){S.favorites.splice(idx,1);document.getElementById('fd-fav-btn').textContent='🤍';toast('Removed from favorites');}
  else{S.favorites.unshift(entry);document.getElementById('fd-fav-btn').textContent='❤️';toast('Added to favorites ❤️');}
  save();
}
function trackFood(){
  if(!detailFood)return;
  const qty=Math.max(0.01,+document.getElementById('fd-qty').value||1);
  const unit=document.getElementById('fd-unit').value;
  const meal=document.getElementById('fd-meal').value;
  const ratio=qty/(detailFood.baseQty||1);
  let name=detailFood.name;
  if(detailFood.isManual){name=document.getElementById('fd-manname').value.trim()||'Custom food';}
  const d=today();if(!S.foods[d])S.foods[d]=[];
  S.foods[d].push({
    id:Date.now().toString(),
    name:`${name} (${qty} ${unit})`,
    meal,
    cal:Math.round(detailFood.cal*ratio),
    carb:+(detailFood.carb*ratio).toFixed(1),
    prot:+(detailFood.prot*ratio).toFixed(1),
    fat:+(detailFood.fat*ratio).toFixed(1),
  });
  if(!S.recents)S.recents=[];
  const recEntry={name,cal:detailFood.cal,carb:detailFood.carb,prot:detailFood.prot,fat:detailFood.fat,baseQty:detailFood.baseQty,baseUnit:detailFood.baseUnit,isOffline:detailFood.isOffline};

      return `<div class="fli" onclick="openFoodDetail(foodCache['${k}'])"><div class="fli-info"><div class="fli-name">${f.name}</div><div class="fli-meta">${f.cal} kcal · 1 serving</div></div><div style="font-family:var(--fm);font-size:12px;color:var(--accent)">${f.cal}</div></div>`;

    fmb.innerHTML=`<div class="fm-sec-lbl">🔍 Results <span style="opacity:.5">(per 100g)</span></div>`+prods.slice(0,6).map(p=>{

    }).join('')+manualBtn;
  }catch(e){
    const fb=OFFL.filter(f=>f.name.toLowerCase().includes(ql));

      const k='sr'+(++fcIdx);foodCache[k]={name:f.name,cal:f.cal,carb:f.carb,prot:f.prot,fat:f.fat,baseQty:1,baseUnit:'serving',isOffline:true};

    }).join(''):`<div style="text-align:center;padding:12px;font-size:12px;color:var(--sub)">No matches.</div>`)+manualBtn;
  }
}

        tabContent+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px 16px 14px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="font-size:15px;font-weight:800">${h.name}</div>
            <div style="width:36px;height:36px;border-radius:10px;
              background:${todayDone?h.color:'var(--surf)'};
              border:${todayDone?'none':'1px solid var(--border)'};
              display:flex;align-items:center;justify-content:center;
              cursor:pointer;transition:all .15s"
              onclick="togH('${h.id}')">
              ${todayDone?`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`:''}
            </div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(${COLS},1fr);gap:4px">
            ${gridDates.map(dt=>{
              const done=hLog(dt,h.id).done;
              const isT=dt===today();
              const fut=isFuture(dt);
              return `<div onclick="${fut?'':'togHDay(\''+h.id+'\',\''+dt+'\')' }"
                style="aspect-ratio:1;border-radius:50%;
                background:${done?h.color:'var(--surf)'};
                opacity:${fut?0.15:done?1:0.3};
                ${isT?'box-shadow:0 0 0 2px '+h.color+',0 0 0 3px var(--card);':''}
                cursor:${fut?'default':'pointer'};
                transition:background .15s">
              </div>`;
            }).join('')}
          </div>
          ${s>0?`<div style="margin-top:10px;font-size:11px;color:var(--sub)">🔥 <span style="font-family:var(--fm);color:var(--accent)">${s}</span> day streak</div>`:''}
        </div>`;
      }
      tabContent+=`</div>`;
    }
  }
 
  el.innerHTML=`${topBar('Habits')}
  <div class="h-tabs">
    <button class="h-tab ${habitTab==='today'?'active':''}" onclick="setHTab('today')">Today</button>
    <button class="h-tab ${habitTab==='weekly'?'active':''}" onclick="setHTab('weekly')">Weekly</button>
    <button class="h-tab ${habitTab==='overall'?'active':''}" onclick="setHTab('overall')">Overall</button>
  </div>
  <div class="h-status">
    <div class="h-progress-bar"><div class="h-progress-fill" style="width:${pct}%"></div></div>
    <div class="h-done-count ${doneCount===total&&total>0?'all':''}">${doneCount} completed</div>
  </div>
  ${tabContent}
  <div style="height:30px"></div>`;
 
  // Attach swipe only in today tab
  if(habitTab==='today'){
    requestAnimationFrame(()=>{
      S.habits.forEach(h=>{
        const card=document.getElementById('hcard-'+h.id);
        if(card)attachSwipe(card,h.id);
      });
    });
  }
}
 
let cardTapTimer={};
function handleCardTap(hid){
  // On tap (no swipe), open weekly detail
  openWeekDetail(hid);
}
 
function setHTab(t){habitTab=t;render();}
 
/* ─── CALORIES ─── */
function rCalories(){
  const el=document.getElementById('s-calories');
  const d=today();const m=mac(d);
  const pct=Math.min(100,Math.round(m.cal/S.calGoal*100));
  const foods=S.foods[d]||[];
  let grade='A',gBg='rgba(74,222,128,.15)',gC='#4ade80';
  if(pct>115){grade='D';gBg='rgba(248,113,113,.15)';gC='#f87171';}
  else if(pct>100){grade='C';gBg='rgba(251,191,36,.15)';gC='#fbbf24';}
  else if(pct>80){grade='B';gBg='rgba(94,234,212,.15)';gC='#5eead4';}
  else if(pct<20&&foods.length){grade='F';gBg='rgba(248,113,113,.15)';gC='#f87171';}
  const mr=[
    {l:'Carbs',v:Math.round(m.carb),c:'#fbbf24',p:Math.min(100,Math.round(m.carb/250*100))},
    {l:'Protein',v:Math.round(m.prot),c:'var(--accent)',p:Math.min(100,Math.round(m.prot/120*100))},
    {l:'Fat',v:Math.round(m.fat),c:'#f472b6',p:Math.min(100,Math.round(m.fat/65*100))},
  ];
  el.innerHTML=`${topBar('Calories',Math.round(m.cal)+' / '+S.calGoal+' kcal today')}
  <div class="ls-hero">
    <div class="ls-top">
      <div><h2>${Math.round(m.cal)} <span style="font-size:14px;color:var(--sub);font-family:var(--f1);font-weight:500">kcal</span></h2>
        <div class="s2">${Math.max(0,S.calGoal-Math.round(m.cal))} remaining · goal ${S.calGoal}</div>
      </div>
      <div class="ls-badge" style="background:${gBg};color:${gC}">${grade}</div>
    </div>
    <div class="ls-rings">${mr.map(r=>`<div class="lsr">${mRing(r.p,r.c)}<div class="lsr-v" style="color:${r.c}">${r.v}g</div><div class="lsr-l">${r.l}</div></div>`).join('')}</div>
    <div class="ls-bar-top"><span>Progress</span><strong>${pct}%</strong></div>
    <div class="pb" style="height:8px"><div class="pbf" style="width:${pct}%;background:${pct>=100?'#f87171':'var(--accent)'}"></div></div>
  </div>
  ${Object.entries(MCFG).map(([id,cfg])=>{
    const mf=foods.filter(f=>f.meal===id);
    const mc=mf.reduce((s,f)=>s+(+f.cal||0),0);
    return `<div class="meal-sec">
      <div class="meal-hdr ${mf.length===0?'empty':''}">
        <div class="mhl"><span class="meal-ico">${cfg.icon}</span><div><div class="meal-ttl">${cfg.label}</div><div class="meal-cal-sub">${Math.round(mc)} kcal</div></div></div>
        <button class="meal-add" onclick="openFoodModal('${id}')">+</button>
      </div>
      ${mf.length?`<div class="meal-body">${mf.map(f=>`<div class="fi">
        <div class="fi-dot" style="background:${cfg.color}"></div>
        <div class="fi-info"><div class="fi-n">${f.name}</div><div class="fi-m">C:${Math.round(f.carb)}g · P:${Math.round(f.prot)}g · F:${Math.round(f.fat)}g</div></div>
        <div class="fi-cal">${Math.round(f.cal)}</div>
        <button class="fi-del" onclick="delF('${f.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
      </div>`).join('')}</div>`:''}
    </div>`;
  }).join('')}
  <div style="height:20px"></div>`;
}
 
/* ─── ANALYTICS ─── */
function rAna(){
  const el=document.getElementById('s-analytics');
  const d=today();const l7=Array.from({length:7},(_,i)=>dOff(i-6));const l30=Array.from({length:30},(_,i)=>dOff(i-29));
  const d7=S.habits.reduce((s,h)=>s+l7.filter(dt=>hLog(dt,h.id).done).length,0);
  const p7=S.habits.length*7;const ovr=p7>0?Math.round(d7/p7*100):0;
  const best=S.habits.reduce((m,h)=>Math.max(m,streak(h)),0);
  const td=S.habits.filter(h=>hLog(d,h.id).done).length;
  const calData=l7.map(dt=>mac(dt).cal);
  const mxC=Math.max(...calData,S.calGoal,1);
  const nz30=l30.map(dt=>mac(dt).cal).filter(c=>c>0);
  const avg30=nz30.length?Math.round(nz30.reduce((a,b)=>a+b,0)/nz30.length):0;
  const aw=Math.round(l7.reduce((s,dt)=>s+(S.water[dt]||0),0)/7*10)/10;
  el.innerHTML=`${topBar('Stats','Your progress')}
  <div class="st-g">
    <div class="st-c"><div class="st-v">${ovr}%</div><div class="st-l">Habit rate 7d</div></div>
    <div class="st-c"><div class="st-v">${best}</div><div class="st-l">Best streak 🔥</div></div>
    <div class="st-c"><div class="st-v">${td}/${S.habits.length}</div><div class="st-l">Today done</div></div>
    <div class="st-c"><div class="st-v">${aw}</div><div class="st-l">Avg water 💧</div></div>
  </div>
  <div class="ana-c">
    <div class="sec-lbl" style="margin-bottom:12px">Calories — Last 7 Days</div>
    <div class="bchart">${calData.map((cal,i)=>{const h=Math.max(3,Math.round((cal/mxC)*76));const col=i===6?'var(--accent)':'var(--accent2,#a78bfa)';return `<div class="bc-col"><div class="bc-wr"><div class="bc-b" style="height:${h}px;background:${col};opacity:${i===6?1:.5}"></div></div><div class="bc-l">${dLbl(l7[i])}</div></div>`;}).join('')}</div>
    <div style="display:flex;justify-content:space-between;margin-top:9px;font-size:11px;color:var(--sub)"><span>Goal: ${S.calGoal}</span><span>30d avg: ${avg30}</span></div>
  </div>
  <div class="ana-c">
    <div class="sec-lbl" style="margin-bottom:10px">Habit Completion — 7 Days</div>
    ${S.habits.length===0?`<div style="text-align:center;padding:14px 0;font-size:13px;color:var(--sub)">No habits yet.</div>`
    :S.habits.map(h=>{const dn=l7.filter(dt=>hLog(dt,h.id).done).length;const p=Math.round(dn/7*100);const s=streak(h);return `<div class="ha-row">
      <div style="width:10px;height:10px;border-radius:50%;background:${h.color};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px">${h.name}</div>
        <div class="pb" style="height:5px"><div class="pbf" style="width:${p}%;background:${h.color}"></div></div>
      </div>
      <div style="font-family:var(--fm);font-size:12px;color:var(--sub);min-width:30px;text-align:right">${p}%</div>
      <div style="font-family:var(--fm);font-size:11px;color:var(--sub);min-width:28px">🔥${s}</div>
    </div>`}).join('')}
  </div>
  <div style="height:20px"></div>`;
}
 
/* ═══════════════ INIT ═══════════════ */
load();render();
if('serviceWorker' in navigator){
  const sw=`const C='lo-v7';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.open(C).then(c=>c.match(e.request).then(r=>{const n=fetch(e.request).then(res=>{c.put(e.request,res.clone());return res;});return r||n;})));});`;
  try{navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});}catch(e){}
}
