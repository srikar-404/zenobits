<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" id="tc" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<title>LifeOS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--card:#1a1a1a;--surf:#262626;--border:rgba(255,255,255,.08);
  --text:#f5f5f5;--sub:#888;--accent:#5eead4;--red:#f87171;--yellow:#fbbf24;
  --green:#4ade80;--blue:#60a5fa;--pink:#f472b6;--purple:#a78bfa;--orange:#fb923c;
  --nav:64px;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
  --r:18px;--rs:12px;--f1:'DM Sans',sans-serif;--f2:'Syne',sans-serif;--fm:'JetBrains Mono',monospace;
}
:root.light{
  --bg:#f2f2f7;--card:#fff;--surf:#e8e8ed;--border:rgba(0,0,0,.07);
  --text:#0a0a0a;--sub:#777;--accent:#7c3aed;--red:#dc2626;--yellow:#b45309;
  --green:#16a34a;--blue:#2563eb;--pink:#be185d;--purple:#7c3aed;--orange:#ea580c;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--f1);background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;transition:background .2s,color .2s}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative}
.sw{flex:1;overflow:hidden;position:relative}
.sc{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav)+var(--sb)+80px);scrollbar-width:none;transform:translateX(105%);transition:transform .28s cubic-bezier(.4,0,.2,1);pointer-events:none;background:var(--bg);will-change:transform}
.sc::-webkit-scrollbar{display:none}
.sc.active{transform:translateX(0);pointer-events:all}
.sc.sl{transform:translateX(-105%)}
.sc.no-t{transition:none!important}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--nav)+var(--sb));padding-bottom:var(--sb);background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;z-index:100;transition:background .2s;contain:layout style}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--sub);padding:6px 0;transition:color .15s}
.nb svg{width:22px;height:22px;stroke-width:1.7}
.nb span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;font-family:var(--f2)}
.nb.on{color:var(--accent)}
#pill{position:absolute;top:6px;height:calc(100%-14px-var(--sb));width:18%;left:1%;background:rgba(0,0,0,.4);border-radius:14px;border:1px solid rgba(255,255,255,.06);transition:left .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
:root.light #pill{background:rgba(0,0,0,.08)}
#fab{position:absolute;bottom:calc(var(--nav) + var(--sb) + 12px);right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#03100e;border:none;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(94,234,212,.35);z-index:150;transition:transform .12s}
:root.light #fab{color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.3);background:var(--accent)}
#fab:active{transform:scale(.9)}
/* HEADER */
.hdr{padding:calc(var(--st)+44px) 18px 12px;background:var(--bg);position:sticky;top:0;z-index:20;transition:background .2s}
.hr{display:flex;align-items:flex-start;justify-content:space-between}
.hdr h1{font-family:var(--f2);font-size:26px;font-weight:800;letter-spacing:-.3px}
.hdr .sub{font-size:12px;color:var(--sub);margin-top:2px}
.ha{display:flex;gap:7px;align-items:center;padding-top:3px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:var(--rs);border:none;cursor:pointer;font-family:var(--f1);font-size:14px;font-weight:700;transition:all .12s}
.bp{background:var(--accent);color:#03100e}.bp:active{opacity:.85;transform:scale(.97)}
:root.light .bp{color:#fff}
.bg{background:var(--surf);color:var(--text);border:1px solid var(--border)}.bg:active{transform:scale(.97)}
.ib{width:32px;height:32px;border-radius:50%;background:var(--surf);border:1px solid var(--border);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}.ib:active{transform:scale(.88)}
.tog{width:40px;height:22px;border-radius:100px;background:var(--surf);border:1px solid var(--border);cursor:pointer;position:relative;flex-shrink:0}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--sub);transition:all .2s}
:root.light .tog::after{transform:translateX(18px);background:var(--accent)}
/* INPUTS */
input,select,textarea{font-family:var(--f1);background:var(--surf);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;padding:10px 13px;width:100%;outline:none;transition:border-color .15s,background .2s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--sub)}
textarea{resize:none;min-height:80px;line-height:1.5}
select option{background:var(--card)}
.fl{margin-bottom:11px}.fl-lbl{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px;text-transform:uppercase;letter-spacing:.7px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.modal{background:var(--card);border-radius:22px 22px 0 0;padding:14px 20px calc(20px + var(--sb));width:100%;max-width:430px;max-height:90dvh;overflow-y:auto;scrollbar-width:none;animation:sUp .26s cubic-bezier(.34,1.15,.64,1);transition:background .2s}
.modal::-webkit-scrollbar{display:none}
@keyframes sUp{from{transform:translateY(100%);opacity:.4}to{transform:translateY(0);opacity:1}}
.mh{width:34px;height:4px;background:var(--surf);border-radius:2px;margin:0 auto 16px}
.mt{font-family:var(--f2);font-size:20px;font-weight:800;margin-bottom:16px}
/* MISC */
.pb{background:var(--surf);border-radius:100px;overflow:hidden}.pbf{height:100%;border-radius:100px;transition:width .4s}
.sl-lbl{font-family:var(--f2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
#toast{position:fixed;bottom:calc(var(--nav)+var(--sb)+74px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);padding:10px 22px;border-radius:100px;font-size:13px;font-weight:700;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap;z-index:9999;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;cursor:default}
 
.spin{width:20px;height:20px;border:2px solid var(--surf);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite;margin:14px auto}
@keyframes rot{to{transform:rotate(360deg)}}
.es{text-align:center;padding:40px 20px;color:var(--sub)}.es .ei{font-size:38px;margin-bottom:10px}.es p{font-size:13px;line-height:1.6}
/* SWATCHES */
.sw-row{display:flex;gap:9px;flex-wrap:wrap}
.sw-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .12s}
.sw-dot.sel{border-color:var(--text);transform:scale(1.2)}
/* DAY BUTTONS */
.day-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:var(--surf);color:var(--sub);font-size:11px;font-weight:800;cursor:pointer;transition:all .15s;font-family:var(--f2)}
.day-btn.on{background:var(--accent);border-color:var(--accent);color:#03100e}
:root.light .day-btn.on{color:#fff}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 12px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
/* HABIT SWIPE */
.hcw{position:relative;border-radius:var(--r);overflow:hidden;height:72px;flex-shrink:0;touch-action:pan-y}
.hcbg{position:absolute;inset:0;border-radius:var(--r);display:flex;align-items:center}
.hcbg.L{justify-content:flex-start;padding-left:20px;background:rgba(74,222,128,.2)}
.hcbg.R{justify-content:flex-end;padding-right:20px;background:rgba(248,113,113,.2)}
.hcard{position:absolute;inset:0;border-radius:var(--r);display:flex;align-items:center;padding:0 18px;gap:12px;cursor:pointer;touch-action:none;user-select:none;-webkit-user-select:none;will-change:transform;transform:translateZ(0);-webkit-backface-visibility:hidden}
.hcard.snap{transition:transform .2s cubic-bezier(.25,.46,.45,.94)}
.hcard .ck{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.hcard.done .ck{background:rgba(255,255,255,.9);border-color:transparent}
.hcard .nm{flex:1;font-size:16px;font-weight:700;color:#fff;line-height:1.2;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcard.done .nm{opacity:.55}
.hcard .st{font-family:var(--fm);font-size:11px;color:rgba(255,255,255,.6);flex-shrink:0}
/* GROUP */
.grp-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border:1px solid var(--border);cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .15s}
.grp-hdr:active{background:var(--surf)}
.grp-chev{font-size:11px;color:var(--sub);display:inline-block;transition:transform .28s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.grp-body{overflow:hidden;height:0;padding-top:0!important;padding-bottom:0!important;transition:height .28s cubic-bezier(.4,0,.2,1)}
/* FOOD MODAL */
.fli{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surf);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:7px;cursor:pointer;transition:all .12s}
.fli:active{border-color:var(--accent);transform:scale(.98)}
.fli-n{font-size:13px;font-weight:700}
.fli-m{font-size:11px;color:var(--sub);margin-top:2px}
.fls{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--sub);margin:12px 0 6px}
/* MEAL */
.meal-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0}
.meal-hdr.empty{border-radius:var(--r)}
.meal-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.fi{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.fi:last-child{border-bottom:none}
/* TODO */
.todo-card{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;transition:all .15s}
</style>
</head>
<body>
<div id="app">
  <div class="sw">
    <div id="s0" class="sc active"></div>
    <div id="s1" class="sc"></div>
    <div id="s2" class="sc"></div>
    <div id="s3" class="sc"></div>
    <div id="s4" class="sc"></div>
  </div>
  <button id="fab" onclick="openFab()">+</button>
  <nav id="nav">
    <div id="pill"></div>
    <button class="nb on" data-i="0" onclick="nav(0)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      <span>Today</span>
    </button>
    <button class="nb" data-i="1" onclick="nav(1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span>Habits</span>
    </button>
    <button class="nb" data-i="2" onclick="nav(2)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      <span>Calories</span>
    </button>
    <button class="nb" data-i="3" onclick="nav(3)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      <span>Todo</span>
    </button>
    <button class="nb" data-i="4" onclick="nav(4)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Stats</span>
    </button>
  </nav>
</div>
<!-- MODALS -->
<div class="ov" id="m-hchoice"><div class="modal"><div class="mh"></div><div class="mt">Add to Habits</div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <button class="btn bg" style="width:100%;padding:15px;justify-content:flex-start;gap:12px" onclick="closeM('m-hchoice');openM('m-habit')"><span style="font-size:20px">✅</span><div style="text-align:left"><div style="font-weight:700">Add Habit</div><div style="font-size:12px;color:var(--sub);margin-top:2px">Track a daily habit</div></div></button>
    <button class="btn bg" style="width:100%;padding:15px;justify-content:flex-start;gap:12px" onclick="closeM('m-hchoice');openM('m-hgroup')"><span style="font-size:20px">📁</span><div style="text-align:left"><div style="font-weight:700">Create Group</div><div style="font-size:12px;color:var(--sub);margin-top:2px">Group similar habits</div></div></button>
  </div>
</div></div>
<div class="ov" id="m-habit"><div class="modal"><div class="mh"></div><div class="mt">New Habit</div>
  <div class="fl"><label class="fl-lbl">Name (add emoji!)</label><input id="h-name" placeholder="🏃 Morning run" maxlength="40"></div>
  <div class="fl"><label class="fl-lbl">Color</label><div class="sw-row" id="sw-row"></div></div>
  <div class="fl"><label class="fl-lbl">Repeat on</label><div id="day-sel" style="display:flex;gap:6px;flex-wrap:wrap"></div></div>
  <div class="fl"><label class="fl-lbl">Add to Group (optional)</label><select id="h-gsel"><option value="">— No group —</option></select></div>
  <div style="display:flex;gap:9px;margin-top:4px">
    <button class="btn bg" style="flex:1" onclick="closeM('m-habit')">Cancel</button>
    <button class="btn bp" style="flex:1" onclick="saveHabit()">Add</button>
  </div>
</div></div>
<div class="ov" id="m-hgroup"><div class="modal"><div class="mh"></div><div class="mt">New Group</div>
  <div class="fl"><label class="fl-lbl">Group Name</label><input id="hg-name" placeholder="💪 Fitness, 🧘 Wellness…" maxlength="40"></div>
  <div style="display:flex;gap:9px"><button class="btn bg" style="flex:1" onclick="closeM('m-hgroup')">Cancel</button><button class="btn bp" style="flex:1" onclick="saveHGroup()">Next →</button></div>
</div></div>
<div class="ov" id="m-hgroup2" style="z-index:250"><div class="modal"><div class="mh"></div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <div style="font-size:20px">📁</div>
    <div><div id="hg2-title" style="font-family:var(--f2);font-size:17px;font-weight:800"></div><div style="font-size:11px;color:var(--sub);margin-top:2px">Add habits to this group</div></div>
  </div>
  <div id="hg2-list" style="margin-bottom:10px;display:flex;flex-direction:column;gap:7px;max-height:180px;overflow-y:auto"></div>
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <input id="hg2-inp" placeholder="Habit name e.g. 🏃 Run" maxlength="40" style="flex:1" onkeydown="if(event.key==='Enter')addHToGroup()">
    <button class="btn bp" onclick="addHToGroup()" style="padding:10px 14px;flex-shrink:0">Add</button>
  </div>
  <div class="fl"><label class="fl-lbl">Color</label><div class="sw-row" id="sw-row2"></div></div>
  <button class="btn bp" style="width:100%" onclick="closeM('m-hgroup2');render()">Done ✓</button>
</div></div>
<div class="ov" id="m-hnote" style="z-index:250"><div class="modal"><div class="mh"></div>
  <div id="hn-title" style="font-family:var(--f2);font-size:18px;font-weight:800;margin-bottom:4px"></div>
  <div id="hn-date" style="font-size:11px;color:var(--sub);margin-bottom:12px"></div>
  <div class="fl"><label class="fl-lbl">Note</label><textarea id="hn-inp" placeholder="How did it go?"></textarea></div>
  <div style="display:flex;gap:9px;margin-bottom:8px">
    <button class="btn bg" style="flex:1" onclick="closeM('m-hnote')">Cancel</button>
    <button class="btn bp" style="flex:1" onclick="saveNote()">Save</button>
  </div>
  <div style="display:flex;gap:9px;margin-top:6px">
    <button onclick="openEditHabit(noteHid)" style="flex:1;padding:10px;background:none;border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:13px;font-weight:700;cursor:pointer">✏️ Edit</button>
    <button onclick="delHabit(noteHid)" style="flex:1;padding:10px;background:none;border:1px solid rgba(248,113,113,.3);border-radius:var(--rs);color:var(--red);font-size:13px;font-weight:700;cursor:pointer">🗑️ Delete</button>
  </div>
</div></div>
<div class="ov" id="m-food"><div class="modal" style="max-height:85dvh"><div class="mh"></div>
  <div style="display:flex;gap:8px;margin-bottom:6px">
    <div style="flex:1;position:relative;display:flex;align-items:center">
      <svg style="position:absolute;left:11px;width:15px;height:15px;stroke:var(--sub);stroke-width:2;pointer-events:none" viewBox="0 0 24 24" fill="none" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="f-search" style="padding-left:34px" placeholder="Search food…" oninput="onFSearch()" onkeydown="if(event.key==='Enter')doSearch()">
    </div>
    <button class="btn bg" onclick="doSearch()" style="padding:10px 13px;flex-shrink:0">Go</button>
  </div>
  <div id="fm-body"></div>
</div></div>
<div class="ov" id="m-fdetail" style="z-index:250"><div class="modal"><div class="mh"></div>
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:8px">
    <div style="flex:1"><div id="fd-name" style="font-family:var(--f2);font-size:17px;font-weight:800;line-height:1.2"></div><div id="fd-src" style="font-size:11px;color:var(--sub);margin-top:3px"></div></div>
    <button id="fd-fav" onclick="toggleFav()" style="background:none;border:none;cursor:pointer;font-size:20px;padding:0">🤍</button>
  </div>
  <div style="display:flex;gap:9px;margin-bottom:11px">
    <div style="flex:1"><label class="fl-lbl">Quantity</label><input type="number" id="fd-qty" value="1" min="0.1" step="any" style="font-size:17px;font-weight:700;text-align:center" oninput="updateFD()"></div>
    <div style="flex:2"><label class="fl-lbl">Unit</label>
      <select id="fd-unit" onchange="updateFD()">
        <option value="serving">serving(s)</option><option value="piece">piece(s)</option><option value="g">g</option><option value="ml">ml</option><option value="cup">cup(s)</option><option value="bowl">bowl(s)</option><option value="plate">plate(s)</option><option value="glass">glass</option><option value="tbsp">tbsp</option><option value="tsp">tsp</option><option value="slice">slice(s)</option><option value="scoop">scoop(s)</option>
      </select>
    </div>
  </div>
  <div class="fl"><label class="fl-lbl">Meal</label>
    <select id="fd-meal"><option value="breakfast">🌅 Breakfast</option><option value="lunch">☀️ Lunch</option><option value="dinner">🌙 Dinner</option><option value="snacks">🍎 Snacks</option></select>
  </div>
  <div style="text-align:center;padding:10px 0 6px">🔥 <span id="fd-cal" style="font-family:var(--fm);font-size:30px;font-weight:600;color:var(--accent)">0</span> <span style="font-size:12px;color:var(--sub)">kcal</span></div>
  <div id="fd-rings" style="display:flex;justify-content:space-around;background:var(--surf);border-radius:14px;padding:14px 8px;margin-bottom:12px"></div>
  <div id="fd-manual" style="display:none">

function attachSwipe(el,hid){
  var sx=0,sy=0,cx=0,drag=false,horiz=null;
  function onStart(e){var pt=e.touches?e.touches[0]:e;sx=pt.clientX;sy=pt.clientY;cx=0;drag=true;horiz=null;el.classList.remove('snap');}
  function onMove(e){
    if(!drag)return;
    var pt=e.touches?e.touches[0]:e;
    var dx=pt.clientX-sx,dy=pt.clientY-sy;
    if(horiz===null){if(Math.abs(dx)<8&&Math.abs(dy)<8)return;horiz=Math.abs(dx)>Math.abs(dy)*1.5;}

function updateFD(){

    cal=+document.getElementById('fd-mcal').value||0;carb=+document.getElementById('fd-mcarb').value||0;
    prot=+document.getElementById('fd-mprot').value||0;fat=+document.getElementById('fd-mfat').value||0;

  document.getElementById('fd-cal').textContent=tc;

  var macArr=[{l:'Carbs',v:tca,pct:Math.round(fC/tot*100),c:'var(--yellow)'},{l:'Protein',v:tp,pct:Math.round(fP/tot*100),c:'var(--accent)'},{l:'Fat',v:tf,pct:Math.round(fF/tot*100),c:'var(--pink)'}];

function trackFood(){

      var cal=Math.round(n2['energy-kcal_100g']||0),carb=Math.round(n2['carbohydrates_100g']||0),prot=Math.round(n2['proteins_100g']||0),fat2=Math.round(n2['fat_100g']||0);

    var h3='<div class="fls">🔍 Local results</div>';
    if(fb.length){fb.slice(0,5).forEach(function(f){var k='sr'+(++fcIdx);foodCache[k]={name:f.n,cal:f.c,carb:f.cb,prot:f.p,fat:f.f,bq:1,bu:'serving',offline:true};h3+='<div class="fli" onclick="openFoodDetail(foodCache[\''+k+'\'])"><div style="flex:1;min-width:0"><div class="fli-n">'+f.n+'</div><div class="fli-m">'+f.c+' kcal</div></div><div style="font-family:var(--fm);font-size:12px;color:var(--accent)">'+f.c+'</div></div>';});}
    else h3+='<div style="text-align:center;padding:12px;font-size:12px;color:var(--sub)">No matches.</div>';
    fmb.innerHTML=h3+manBtn;
  }
}

function rTodo(){
  var el=document.getElementById('s3');if(!el)return;
  var total=S.todos.length,done=S.todos.filter(function(t){return t.done;}).length;
  var pct=total>0?Math.round(done/total*100):0;
  var priO={high:0,med:1,low:2};
  function sortTodos(arr){return arr.slice().sort(function(a,b){if(a.done!==b.done)return a.done?1:-1;if(a.done)return 0;var pd=(priO[a.priority]||1)-(priO[b.priority]||1);if(pd!==0)return pd;if(a.due&&b.due)return a.due.localeCompare(b.due);if(a.due)return -1;if(b.due)return 1;return 0;});}
  function todoCard(t){
    var priC=t.priority==='high'?'var(--red)':t.priority==='low'?'var(--green)':'var(--yellow)';
    var isOver=t.due&&!t.done&&t.due<today();
    var isToday2=t.due&&!t.done&&t.due===today();
    var dueLbl='';
    if(t.due){var ds2=new Date(t.due+'T12:00:00').toLocaleDateString('en',{month:'short',day:'numeric'});var dc=isOver?'var(--red)':isToday2?'var(--yellow)':'var(--sub)';var dp=isOver?'⚠️ Overdue · ':isToday2?'📅 Due today · ':'📅 ';dueLbl='<div style="font-size:10px;margin-top:2px;color:'+dc+'">'+dp+ds2+'</div>';}
    var bd=isOver?'rgba(248,113,113,.35)':'var(--border)';var bg=isOver?'rgba(248,113,113,.05)':'var(--card)';
    var ck2='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--bg)" stroke-width="3.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';
    return '<div class="todo-card" style="border-color:'+bd+';background:'+bg+';'+(t.done?'opacity:.45;':'')+'">'
      +'<div onclick="togTodo(\''+t.id+'\')" style="width:22px;height:22px;border-radius:50%;flex-shrink:0;border:2px solid '+(t.done?'var(--accent)':'var(--border)')+';background:'+(t.done?'var(--accent)':'transparent')+';display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s">'+(t.done?ck2:'')+'</div>'
      +'<div style="width:7px;height:7px;border-radius:50%;background:'+priC+';flex-shrink:0;margin-top:3px"></div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;'+(t.done?'text-decoration:line-through;':'')+' white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+t.title+'</div>'+dueLbl+'</div>'
      +'<button onclick="delTodo(\''+t.id+'\')" style="background:none;border:none;cursor:pointer;color:var(--sub);font-size:15px;padding:0 2px">×</button>'
      +'</div>';
  }
  function renderGroup(gid,depth){
    var g=S.tgroups.find(function(x){return x.id===gid;});if(!g)return'';
    var cGroups=S.tgroups.filter(function(x){return x.parentId===gid;});
    var cTodos=sortTodos(S.todos.filter(function(t){return t.groupId===gid;}));
    var coll=_collTGrps[gid];var gDone=cTodos.filter(function(t){return t.done;}).length;
    var ind=depth*12;var br=coll?'16px':'16px 16px 0 0';
    var h='<div style="margin-bottom:8px;margin-left:'+ind+'px">'
      +'<div onclick="togTGrp(\''+gid+'\')" style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:'+br+';cursor:pointer;transition:background .15s"><span style="font-size:11px;color:var(--sub);display:inline-block;transform:rotate('+(coll?0:90)+'deg);transition:transform .28s">▶</span><div style="flex:1;font-weight:700;font-size:15px">'+g.name+'</div><div style="font-size:11px;color:var(--sub);font-family:var(--fm)">'+gDone+'/'+cTodos.length+'</div><button onclick="event.stopPropagation();delTGrp(\''+gid+'\')" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--sub);padding:0 2px">🗑️</button></div>';
    if(!coll){
      h+='<div style="background:var(--surf);border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px;padding:8px;display:flex;flex-direction:column;gap:6px">';
      cTodos.forEach(function(t){h+=todoCard(t);});
      cGroups.forEach(function(cg){h+=renderGroup(cg.id,0);});
      h+='<div style="display:flex;gap:6px;margin-top:2px">'
        +'<button data-gid="'+gid+'" onclick="openTodoItem(this.dataset.gid)" style="flex:1;padding:8px;background:var(--card);border:1.5px dashed var(--border);border-radius:10px;color:var(--sub);font-size:12px;font-weight:700;cursor:pointer">+ Add Task</button>'
        +'<button data-gid="'+gid+'" onclick="openTodoGroup(this.dataset.gid)" style="flex:1;padding:8px;background:var(--card);border:1.5px dashed var(--border);border-radius:10px;color:var(--sub);font-size:12px;font-weight:700;cursor:pointer">📁 Sub-group</button>'
        +'</div></div>';
    }
    h+='</div>';return h;
  }
  var rootTodos=sortTodos(S.todos.filter(function(t){return !t.groupId;}));
  var rootGroups=S.tgroups.filter(function(g){return !g.parentId;});
  var bodyHtml='';
  rootGroups.forEach(function(g){bodyHtml+=renderGroup(g.id,0);});
  rootTodos.forEach(function(t){bodyHtml+=todoCard(t);});
  if(!bodyHtml)bodyHtml='<div class="es"><div class="ei">📝</div><p>No tasks yet.<br>Tap <b>+</b> to add your first task or group.</p></div>';
  var progHtml='';
  if(total>0){progHtml='<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:5px"><span>Progress</span><span>'+pct+'%</span></div><div class="pb" style="height:6px"><div class="pbf" style="width:'+pct+'%;background:var(--accent)"></div></div></div>';}
  el.innerHTML=hdr('Todo',done+'/'+total+' done')+progHtml+'<div style="padding:0 16px;display:flex;flex-direction:column;gap:8px;margin-top:14px;padding-bottom:20px">'+bodyHtml+'</div>';
}

var _collTGrps=collTGrps;
 
function openTodoItem(pgid){todoParentGid=pgid||null;todoPri='med';document.getElementById('ti-name').value='';document.getElementById('ti-due').value='';document.getElementById('ti-title').textContent=pgid?'Add Task to Group':'New Task';setPri('med');openM('m-titem');}

function saveTodoItem(){

function saveTodoGroup(){

function togTodo(id){var t=S.todos.find(function(x){return x.id===id;});if(!t)return;t.done=!t.done;save();render();}
function delTodo(id){
  var t=S.todos.find(function(x){return x.id===id;});if(!t)return;
  var bak=S.todos.slice(),bidx=S.todos.findIndex(function(x){return x.id===id;});
  S.todos=S.todos.filter(function(x){return x.id!==id;});save();
  showUndo('Task deleted 🗑️',function(){S.todos.splice(bidx,0,t);save();renderAll();});

}
function togTGrp(gid){_collTGrps[gid]=!_collTGrps[gid];render();}
function delTGrp(gid){
  var bak={groups:S.tgroups.slice(),todos:S.todos.slice()};
  S.tgroups=S.tgroups.filter(function(g){return g.id!==gid;});
  S.todos=S.todos.filter(function(t){return t.groupId!==gid;});
  save();showUndo('Group deleted 🗑️',function(){S.tgroups=bak.groups;S.todos=bak.todos;save();renderAll();});rPending=false;render();

// ═══ STATS ═══
function rStats(){
  var el=document.getElementById('s4');if(!el)return;
  var d=today();var l7=[];for(var i=0;i<7;i++)l7.push(dOff(i-6));
  var d7=S.habits.reduce(function(s,h){return s+l7.filter(function(dt){return hLog(dt,h.id).done;}).length;},0);
  var p7=S.habits.length*7;var ovr=p7>0?Math.round(d7/p7*100):0;
  var best=S.habits.reduce(function(m,h){return Math.max(m,streak(h));},0);
  var td=S.habits.filter(function(h){return hLog(d,h.id).done;}).length;
  var calData=l7.map(function(dt){return macros(dt).cal;});
  var mxC=Math.max.apply(null,calData.concat([S.calGoal,1]));
  var l30=[];for(var j=0;j<30;j++)l30.push(dOff(j-29));
  var nz30=l30.map(function(dt){return macros(dt).cal;}).filter(function(c){return c>0;});
  var avg30=nz30.length?Math.round(nz30.reduce(function(a,b){return a+b;},0)/nz30.length):0;
  var aw=Math.round(l7.reduce(function(s,dt){return s+(S.water[dt]||0);},0)/7/100)/10;
  var statsHtml='<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 16px 10px">'
    +'<div class="card" style="text-align:center;padding:14px 12px"><div style="font-family:var(--fm);font-size:28px;font-weight:600;color:var(--accent);line-height:1">'+ovr+'%</div><div style="font-size:10px;color:var(--sub);margin-top:5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">Habit rate 7d</div></div>'
    +'<div class="card" style="text-align:center;padding:14px 12px"><div style="font-family:var(--fm);font-size:28px;font-weight:600;color:var(--accent);line-height:1">'+best+'</div><div style="font-size:10px;color:var(--sub);margin-top:5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">Best streak 🔥</div></div>'
    +'<div class="card" style="text-align:center;padding:14px 12px"><div style="font-family:var(--fm);font-size:28px;font-weight:600;color:var(--accent);line-height:1">'+td+'/'+S.habits.length+'</div><div style="font-size:10px;color:var(--sub);margin-top:5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">Today done</div></div>'
    +'<div class="card" style="text-align:center;padding:14px 12px"><div style="font-family:var(--fm);font-size:28px;font-weight:600;color:var(--accent);line-height:1">'+aw+'L</div><div style="font-size:10px;color:var(--sub);margin-top:5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">Avg water 💧</div></div>'
    +'</div>';
  var barsHtml='<div class="card"><div class="sl-lbl" style="margin-bottom:12px">Calories — Last 7 Days</div>'
    +'<div style="display:flex;align-items:flex-end;gap:5px;height:80px;padding-bottom:2px">';
  l7.forEach(function(dt,i){
    var h2=Math.max(3,Math.round((calData[i]/mxC)*76));
    var col=i===6?'var(--accent)':'var(--purple)';var op=i===6?1:.5;
    var lbl=['Su','Mo','Tu','We','Th','Fr','Sa'][new Date(dt+'T12:00:00').getDay()];
    barsHtml+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">'
      +'<div style="flex:1;display:flex;align-items:flex-end;width:100%"><div style="width:100%;height:'+h2+'px;border-radius:5px 5px 0 0;background:'+col+';opacity:'+op+'"></div></div>'
      +'<div style="font-size:9px;color:var(--sub);font-weight:700">'+lbl+'</div>'
      +'</div>';
  });
  barsHtml+='</div><div style="display:flex;justify-content:space-between;margin-top:9px;font-size:11px;color:var(--sub)"><span>Goal: '+S.calGoal+'</span><span>30d avg: '+avg30+'</span></div></div>';
  var habBarsHtml='<div class="card"><div class="sl-lbl" style="margin-bottom:10px">Habit Completion — 7 Days</div>';
  if(S.habits.length===0){habBarsHtml+='<div style="text-align:center;padding:14px 0;font-size:13px;color:var(--sub)">No habits yet.</div>';}
  else{S.habits.forEach(function(h){var dn=l7.filter(function(dt){return hLog(dt,h.id).done;}).length;var p2=Math.round(dn/7*100);var s=streak(h);habBarsHtml+='<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)"><div style="width:10px;height:10px;border-radius:50%;background:'+h.color+';flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px">'+h.name+'</div><div class="pb" style="height:5px"><div class="pbf" style="width:'+p2+'%;background:'+h.color+'"></div></div></div><div style="font-family:var(--fm);font-size:12px;color:var(--sub);min-width:30px;text-align:right">'+p2+'%</div><div style="font-family:var(--fm);font-size:11px;color:var(--sub);min-width:28px">🔥'+s+'</div></div>';});}
  habBarsHtml+='</div>';
  el.innerHTML=hdr('Stats','Your progress at a glance')+statsHtml+barsHtml+habBarsHtml+'<div style="height:20px"></div>';
}

// ═══ SWIPE NAV (global) ═══
(function(){
  var app=document.getElementById('app');
  var tx=0,ty=0,locked=null,swiping=false;
  app.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY;locked=null;swiping=false;},{passive:true});
  app.addEventListener('touchmove',function(e){
    if(e.target.closest('.hcw')||e.target.closest('.hcard'))return;
    var dx=e.touches[0].clientX-tx,dy=e.touches[0].clientY-ty;
    if(!locked){if(Math.abs(dx)<10&&Math.abs(dy)<10)return;locked=Math.abs(dx)>Math.abs(dy)*1.5?'h':'v';}
    if(locked==='h'){var idx=curScreen;if((dx<0&&idx<4)||(dx>0&&idx>0)){e.preventDefault();swiping=true;}}
  },{passive:false});
  app.addEventListener('touchend',function(e){
    if(!swiping)return;
    var dx=e.changedTouches[0].clientX-tx;
    if(dx<-90&&curScreen<4)nav(curScreen+1,'r');
    else if(dx>90&&curScreen>0)nav(curScreen-1,'l');
    swiping=false;locked=null;
  },{passive:true});
})();

/* ─── UNDO SNACKBAR ─── */
var _undoFn=null,_undoT=null;
function showUndo(msg,fn){
  _undoFn=fn;
  clearTimeout(_undoT);
  var bar=document.getElementById('undo-bar');
  var msgEl=document.getElementById('undo-msg');
  if(!bar||!msgEl)return;
  msgEl.textContent=msg;
  bar.style.bottom='calc(var(--nav,64px) + 16px)';
  _undoT=setTimeout(function(){
    bar.style.bottom='-80px';
    _undoFn=null;
  },4000);
}
function doUndo2(){
  clearTimeout(_undoT);
  var bar=document.getElementById('undo-bar');
  if(bar)bar.style.bottom='-80px';
  if(_undoFn){_undoFn();_undoFn=null;}
}
 
/* ─── EDIT HABIT ─── */
var editHid=null, editDays=[];
var editCol=CARD_COLORS[0];
 
function openEditHabit(hid){
  var h=S.habits.find(function(x){return x.id===hid;});if(!h)return;
  editHid=hid;
  editCol=h.color;
  editDays=(h.freq&&h.freq.length>0)?h.freq.slice():[0,1,2,3,4,5,6];
  document.getElementById('he-name').value=h.name;
  renderEditSwatches();
  renderEditDays();
  openM('m-hedit');
}
function renderEditSwatches(){
  var el=document.getElementById('sw-edit');if(!el)return;
  el.innerHTML=CARD_COLORS.map(function(col){
    return '<div class="sw-dot'+(col===editCol?' sel':'')+'" style="background:'+col+'" data-col="'+col+'" onclick="editCol=this.dataset.col;renderEditSwatches()"></div>';
  }).join('');
}
function renderEditDays(){
  var el=document.getElementById('he-days');if(!el)return;
  el.innerHTML=DAYS3.map(function(d,i){
    return '<button type="button" class="day-btn'+(editDays.indexOf(i)>=0?' on':'')+'" onclick="togEditDay('+i+')">'+d+'</button>';
  }).join('');
}
function togEditDay(i){
  var idx=editDays.indexOf(i);
  if(idx>=0)editDays.splice(idx,1);else editDays.push(i);
  renderEditDays();
}
function saveEditHabit(){
  var h=S.habits.find(function(x){return x.id===editHid;});if(!h)return;
  var n=document.getElementById('he-name').value.trim();
  if(!n){toast2('Enter a name');return;}
  h.name=n;
  h.color=editCol;
  h.freq=editDays.length===7?[]:editDays.slice();
  save();closeM('m-hedit');closeM('m-hnote');render();
  toast2('Habit updated ✅');
}
function toast2(m){
  var e=document.getElementById('toast');if(!e)return;
  e.innerHTML=m;e.classList.add('show');
  clearTimeout(e._t2);
  e._t2=setTimeout(function(){e.classList.remove('show');},2000);
}
